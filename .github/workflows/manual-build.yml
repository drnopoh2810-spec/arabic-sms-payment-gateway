name: Manual Build APK

on:
  workflow_dispatch:
    inputs:
      build-type:
        description: 'Build Type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - debugInsecure
          - insecure
          - release
      version-name:
        description: 'Version Name (e.g., v2.0.0)'
        required: true
        default: 'v2.0.0-arabic'
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: "temurin"
          java-version: 17

      - name: Cache Gradle and wrapper
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}

      - name: Create dummy google-services.json
        run: |
          mkdir -p app
          echo '{
            "project_info": {
              "project_number": "123456789",
              "project_id": "dummy-project"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:123456789:android:abcdef",
                  "android_client_info": {
                    "package_name": "me.capcom.smsgateway.arabic"
                  }
                },
                "oauth_client": [],
                "api_key": [
                  {
                    "current_key": "dummy-api-key"
                  }
                ],
                "services": {
                  "appinvite_service": {
                    "other_platform_oauth_client": []
                  }
                }
              }
            ],
            "configuration_version": "1"
          }' > ./app/google-services.json

      - name: Set App Version
        run: |
          export VERSION_NAME='${{ inputs.version-name }}'
          sed -i "s/versionName.*/versionName \"${VERSION_NAME#v}\"/" app/build.gradle
          sed -i "s/versionCode.*/versionCode $(( ($(date +%s) - $(date -d "2022-06-15" +%s)) / 86400 ))/" app/build.gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build ${{ inputs.build-type }} APK
        run: |
          TARGET="${{ inputs.build-type }}"
          ./gradlew assemble${TARGET^}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.build-type }}-apk-${{ inputs.version-name }}
          path: app/build/outputs/apk/${{ inputs.build-type }}/*.apk
          retention-days: 30

      - name: List built files
        run: |
          echo "Built APK files:"
          find app/build/outputs/apk -name "*.apk" -type f